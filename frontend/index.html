<!DOCTYPE html>
<html lang="en" ng-app="ecommerceApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Order Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">

</head>
<body ng-controller="MainController">

    <!-- Navbar (hidden on login page) -->
    <nav class="navbar navbar-expand-lg navbar-dark" ng-if="isLoggedIn()">
        <div class="container-fluid">
            <a class="navbar-brand" href="#/products">
                <i class="fas fa-shopping-cart"></i> E-Commerce Engine
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" ng-class="{active: isActive('/products')}" href="#/products">
                            <i class="fas fa-store"></i> Products
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" ng-class="{active: isActive('/cart')}" href="#/cart">
                            <i class="fas fa-shopping-basket"></i> Cart
                            <span class="badge bg-danger ms-1" ng-if="cartCount > 0">{{cartCount}}</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" ng-class="{active: isActive('/orders')}" href="#/orders">
                            <i class="fas fa-receipt"></i> Orders
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" ng-class="{active: isActive('/logs')}" href="#/logs">
                            <i class="fas fa-scroll"></i> Logs
                        </a>
                    </li>
                    <li class="nav-item" ng-if="isAdmin()">
                        <a class="nav-link" ng-class="{active: isActive('/admin')}" href="#/admin">
                            <i class="fas fa-cog"></i> Admin
                        </a>
                    </li>
                </ul>
                <div class="user-section d-flex align-items-center gap-3">
                    <span class="user-greeting">
                        <i class="fas fa-user-circle"></i> {{getFirstName()}}
                    </span>
                    <button class="btn btn-outline-light btn-sm logout-btn" ng-click="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div ng-class="isLoggedIn() ? 'content-area' : ''">
        <div ng-view></div>
    </div>

    <!-- Footer (hidden on login page) -->
    <div class="footer" ng-if="isLoggedIn()">
        <p>E-Commerce Order Engine Hackathon | Built with Spring Boot + AngularJS + MySQL</p>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="node_modules/angular/angular.min.js"></script>
    <script src="node_modules/angular-route/angular-route.min.js"></script>
    <script src="node_modules/angular-animate/angular-animate.min.js"></script>
    <script src="app.js"></script>
    <script src="services/apiService.js"></script>
    <script src="controllers/authController.js"></script>
    <script src="controllers/productController.js"></script>
    <script src="controllers/cartController.js"></script>
    <script src="controllers/orderController.js"></script>
    <script src="controllers/logController.js"></script>
    <script src="controllers/adminController.js"></script>
</body>
</html>
